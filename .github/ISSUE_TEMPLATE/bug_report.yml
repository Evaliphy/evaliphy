name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please ensure you have searched for existing issues before opening a new one.
  - type: checkboxes
    id: check-existing
    attributes:
      label: Search before opening
      options:
        - label: I have searched for existing issues and this is not a duplicate.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is and what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction steps
      description: How do you trigger this bug? Please provide a minimal reproduction if possible.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: Environment Info
      description: |
        - Evaliphy version (e.g. 1.0.0)
        - Node.js version (node -v)
        - Operating System
      placeholder: |
        Evaliphy: 
        Node: 
        OS: 
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
